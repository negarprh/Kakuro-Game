{% extends "base.html" %}
{% block title %}Welcome | Kakuro{% endblock %}
{% block content %}
<section class="card card-centered hero-panel">
    <p class="eyebrow">Kakuro Game</p>
    <h1>Welcome to Kakuro</h1>
    <p class="sub">Play as a guest or sign in to save games and record scores.</p>

    <div class="stack">
        <form method="post" action="{{ url_for('continue_as_guest') }}">
            <button class="btn large" type="submit">Continue as Guest</button>
        </form>
        <a class="btn large outline" href="{{ url_for('open_signup_page') }}">Sign Up</a>
        <a class="btn large ghost" href="{{ url_for('open_login_page') }}">Log In</a>
    </div>
</section>
{% endblock %}
